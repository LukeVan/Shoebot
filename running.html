<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DICK'S">
<meta http-equiv="Cache-control" content="no-store">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Ask DICK'S</title>
<style>
@font-face {
  font-family: 'DSGSans';
  src: url('fonts/DSGSans-Medium.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'DSGSans';
  src: url('fonts/DSGSans-Bold.otf') format('opentype');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'DSGSans';
  src: url('fonts/DSGSans-Black.otf') format('opentype');
  font-weight: 800;
  font-style: normal;
}
@font-face {
  font-family: 'DSGSans';
  src: url('fonts/DSGSans-Ultra.otf') format('opentype');
  font-weight: 900;
  font-style: normal;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Archivo', sans-serif;
  background: #fff;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: #131313;
}

/* ── Header ── */
.chat-header {
  flex-shrink: 0;
  height: calc(52px + env(safe-area-inset-top, 0px));
  padding-top: env(safe-area-inset-top, 0px);
  padding-left: 20px;
  padding-right: 52px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  position: relative;
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
}

.header-title {
  font-family: 'Archivo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: #131313;
}

.header-close {
  position: absolute;
  right: 16px;
  background: none;
  border: none;
  cursor: pointer;
  color: #131313;
  font-size: 18px;
  padding: 8px;
  line-height: 1;
  -webkit-tap-highlight-color: transparent;
}

/* ── Messages ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 32px 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  -webkit-overflow-scrolling: touch;
}

.chat-messages::-webkit-scrollbar { display: none; }

/* ── Welcome ── */
.welcome-heading {
  font-family: 'DSGSans', sans-serif;
  font-weight: 800;
  font-size: 50px;
  line-height: 47px;
  color: #131313;
  text-align: center;
  margin-bottom: 12px;
}

.welcome-sub {
  font-family: 'Archivo', sans-serif;
  font-size: 18px;
  line-height: 26px;
  color: #131313;
  text-align: center;
  margin-bottom: 28px;
}

/* ── Starter cards (bc-prompt-pill-button--has-image) ── */
.starter-cards { display: flex; flex-direction: column; gap: 8px; }

.starter-card {
  font-family: 'Archivo', sans-serif;
  background: #FFFFFF;
  border: 1px solid #E0E0E0;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  align-items: stretch;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease;
}

.starter-card:active { background: #f5f5f5; }

.starter-card-img {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
  object-fit: cover;
  background: #f0f0f0;
  display: block;
}

.starter-card-text {
  flex: 1;
  font-size: 16px;
  font-weight: 400;
  color: #131313;
  line-height: 1.5;
  padding: 14px 16px;
  align-self: center;
}

.starter-card-arrow {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding-right: 16px;
  color: #006554;
}

.starter-card-arrow svg { width: 20px; height: 20px; display: block; }

/* ── Chat rows ── */
.msg-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.msg-row.user { justify-content: flex-end; }
.msg-row.assistant { justify-content: flex-start; }

/* DICK'S avatar */
.dicks-avatar {
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #006554;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DSGSans', sans-serif;
  font-size: 8px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.3px;
  line-height: 1;
  text-align: center;
  text-transform: uppercase;
  margin-top: 1px;
}

/* Messages: border-radius 10px, padding 8px 16px */
.bubble {
  max-width: 80%;
  padding: 8px 16px;
  border-radius: 10px;
  font-family: 'Archivo', sans-serif;
  font-size: 17px;
  line-height: 1.6;
  word-break: break-word;
}

.bubble.user {
  background: #006554;
  color: #FFFFFF;
}

.bubble.assistant {
  background: #FFFFFF;
  color: #292929;
  /* --message-concierge-border-width: 0 */
}

/* ── Loading: transparent background ── */
.loading-dots {
  display: flex;
  gap: 5px;
  padding: 8px 16px;
  background: transparent;
}

.loading-dots span {
  width: 8px;
  height: 8px;
  background: #bbb;
  border-radius: 50%;
  animation: dotpulse 1.2s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotpulse {
  0%, 60%, 100% { transform: translateY(0); background: #ccc; }
  30% { transform: translateY(-5px); background: #006554; }
}

/* ── Message feedback row (Sources + thumbs) ── */
.msg-feedback {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  padding-left: 48px;
}

.sources-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Archivo', sans-serif;
  font-size: 13px;
  color: #131313;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
  flex: 1;
}

.feedback-btns {
  display: flex;
  gap: 4px;
}

.feedback-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #FFFFFF;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

.feedback-btn:active { background: #f0f0f0; }

.sources-panel {
  position: absolute;
  bottom: 100%;
  left: 0;
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 8px 4px;
  min-width: 240px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  z-index: 10;
}
.sources-panel a {
  display: block;
  padding: 7px 12px;
  font-size: 12px;
  color: #005243;
  text-decoration: none;
  border-radius: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sources-panel a:hover { background: #f5f5f5; }
.sources-btn.no-sources { opacity: 0.4; pointer-events: none; }

/* ── Follow-up suggestions (bc-prompt-suggestion-button) ── */
.followups-section { margin-top: 4px; }

.followups-label {
  font-family: 'Archivo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #131313;
  margin-bottom: 8px;
}

.followup-pills { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }

.followup-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #F0F0F0;
  border: none;
  border-radius: 999px;
  padding: 14px 20px;
  cursor: pointer;
  font-family: 'Archivo', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: #292929;
  line-height: 1.4;
  -webkit-tap-highlight-color: transparent;
  text-align: left;
}

.followup-pill:active { background: #E5E5E5; }

.followup-pill svg { flex-shrink: 0; fill: #131313; }

/* ── Shoe rec card ── */
.shoe-rec-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 16px;
  overflow: hidden;
  width: 240px;
  /* --multimodal-card-box-shadow: none */
}

.shoe-rec-card img {
  width: 100%;
  height: 155px;
  object-fit: contain;
  background: #f7f8fa;
  display: block;
  padding: 10px;
}

.shoe-rec-card-body { padding: 12px 14px 14px; }

.shoe-rec-name {
  font-family: 'Archivo', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: #131313;
  line-height: 1.25;
  margin-bottom: 3px;
}

.shoe-rec-price { font-size: 13px; color: #666; margin-bottom: 10px; font-family: 'DSGSans', sans-serif; }

.shoe-rec-link {
  display: block;
  background: #006554;
  color: #fff;
  text-align: center;
  padding: 8px 12px;
  border-radius: 8px;
  text-decoration: none;
  font-family: 'Archivo', sans-serif;
  font-weight: 600;
  font-size: 13px;
  border: none;
  cursor: pointer;
  width: 100%;
  box-sizing: border-box;
}

/* ── Email button ── */
.email-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: #F0F0F0;
  border: none;
  border-radius: 999px;
  color: #292929;
  padding: 10px 18px;
  font-family: 'Archivo', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.email-btn:active { background: #E5E5E5; }
.email-sent { font-family: 'DSGSans', sans-serif; font-size: 14px; color: #006554; font-weight: 500; }

/* ── Input area ── */
.chat-input-area {
  flex-shrink: 0;
  padding: 12px 16px;
  padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
  background: #fff;
  border-top: 1px solid #e8e8e8;
}

/* Gradient border via wrapper */
.input-gradient-border {
  background: linear-gradient(135deg, #4DAF90 0%, #005343 100%);
  border-radius: 28px;
  padding: 2px;
  box-shadow: 0 4px 16px 0 rgba(0,0,0,0.16);
}

.chat-input-row {
  display: flex;
  align-items: center;
  background: #FFFFFF;
  border-radius: 26px;
  height: 48px;
  padding: 0 6px 0 8px;
  gap: 6px;
}

.input-plus-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  color: #131313;
}

.chat-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 16px;
  font-family: 'Archivo', sans-serif;
  background: transparent;
  color: #292929;
  min-width: 0;
}

.chat-input::placeholder { color: #9a9a9a; }

.input-send-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #005343;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}

.input-send-btn:active { opacity: 0.8; }

.input-voice-btns {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.input-voice-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  color: #131313;
}
</style>
</head>
<body>

<div class="chat-header">
  <div class="header-title">Ask DICK'S</div>
  <button class="header-close" onclick="history.back()">✕</button>
</div>

<div class="chat-messages" id="messages">
  <div id="welcome-state">
    <div class="welcome-heading" id="welcome-heading">Welcome! Ask me what you need.</div>
    <div class="welcome-sub">I'm here to assist and support you along your athletic journey. Choose an option below or tell me what interests you.</div>
    <div class="starter-cards" id="starter-cards"></div>
  </div>
</div>

<div class="chat-input-area">
  <div class="input-gradient-border">
    <div class="chat-input-row">
      <button class="input-plus-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" stroke="#131313" stroke-width="1.5"/>
          <path d="M10 6.5V13.5M6.5 10H13.5" stroke="#131313" stroke-width="1.5" stroke-linecap="round"/>

            <line x1="9" y1="21" x2="15" y2="21" stroke="#131313" stroke-width="1.6" stroke-linecap="round"/>

        </button>
        <button class="input-voice-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="9" width="2.5" height="6" rx="1.25" fill="#131313"/>

      </div>
      <button class="input-send-btn" id="send-btn" style="display:none">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M15.0235 0.975595C14.854 0.806843 14.6017 0.755283 14.3798 0.842779L1.17979 6.04981C0.964171 6.13419 0.817299 6.33653 0.801667 6.56778C0.786035 6.79903 0.904795 7.01856 1.10714 7.13106L6.11104 9.92716L8.92823 14.8967C9.03526 15.085 9.23526 15.2006 9.4501 15.2006C9.46416 15.2006 9.479 15.1998 9.49307 15.199C9.72432 15.1826 9.9251 15.0342 10.0087 14.8186L15.1587 1.61856C15.2454 1.39669 15.1923 1.14356 15.0235 0.975595Z" fill="white"/>
        </svg>
      </button>
    </div>

<script>
// ─── Config ────────────────────────────────────────────────────────────
const CLAUDE_API_KEY = '';
const EMAILJS_SERVICE_ID = 'service_y5dkqan';
const EMAILJS_TEMPLATE_ID = 'template_1pjzdkc';
const EMAILJS_PUBLIC_KEY = 'VrxFJa16cTB_Dj7c2';

// ─── URL params ─────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const firstName = params.get('firstName') || '';
const lastName = params.get('lastName') || '';
const email = params.get('email') || '';
const sendRec = params.get('sendRecommendation') !== 'false';
const sportParam = (params.get('sport') || 'running').toLowerCase();

if (firstName) {
  document.getElementById('welcome-heading').textContent = `Welcome${firstName ? ', ' + firstName : ''}! Ask me what you need.`;
}

// ─── Sport configs ──────────────────────────────────────────────────────
const SPORT_CONFIGS = {
  running: {
    name: 'Running',
    systemRole: 'running coach and shoe expert',
    systemFocus: 'experience level, weekly mileage, cushion preference, injuries, gender and shoe size for recommendation',
    starterCards: [
      { q: "I'm brand new to running. How do I get started?", img: 'images/running/image1.png' },
      { q: "I'm training for my first marathon.", img: 'images/running/image2.jpg' },
      { q: "How can I prioritize injury prevention while training for running?", img: 'images/running/image3.jpg' }
    ],
    scripts: {
      "I'm brand new to running. How do I get started?": [
        { text: "Great decision — running is one of the most accessible ways to build fitness. The biggest mistake beginners make is starting too fast. The run/walk method works really well: run 1 minute, walk 2 minutes, repeat. Over a few weeks, flip that ratio. Your easy pace should always be conversational — if you can't speak in full sentences, slow down. What's drawing you to running? Are you looking to get active, maybe work toward a 5K, or do you have a longer-term goal in mind?", sources: [
          { title: "Guide to Proper Running Form", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/guide-to-proper-running-form" },
          { title: "5K Training Plans", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/5k-training-plans" }
        ]},
        { text: "That's a perfect starting point. Here's what matters most early on: the 10% rule — never increase your weekly mileage by more than 10% from week to week. Most beginner injuries come from doing too much too soon. Also, do a 5-minute dynamic warm-up before each run and 5 minutes of stretching after. Your body will thank you in week three. Do you have any knee, shin, or foot concerns already, or are you starting completely fresh?", sources: [
          { title: "Five Pre-Run Stretches", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/five-pre-run-stretches" },
          { title: "When to Replace Running Shoes", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/how-to-know-when-to-replace-running-shoes" }
        ]},
        { text: "Perfect — you're in a great position to start right. The shoe you choose makes a real difference in how your body feels during those first miles. To match you with the right one: what shoe size do you wear, and are you looking at men's or women's?", sources: [
          { title: "How to Choose Running Shoes", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/how-to-choose-running-shoes" }
        ]}
      ],
      "I'm training for my first marathon.": [
        { text: "Congrats on committing to a marathon — that's a serious goal. The foundation of good marathon training is keeping 80% of your miles easy. Most first-timers run their easy days too fast and arrive at race day already burned out. A good check: your easy pace should feel like you could hold a full conversation. How many weeks out is your race, and where are you in your training plan right now?", sources: [
          { title: "Marathon Training Plans", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/marathon-training-plans-for-beginners-experienced-runners" },
          { title: "Marathon Essentials Checklist", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/marathon-clothing-and-essentials-checklist" }
        ]},
        { text: "Good to know. At marathon mileage, shoe durability and cushioning become critical — running shoes last 300–500 miles and you can easily burn through a pair just in training. You also want something that feels fresh on mile 18, not just mile 1. Are you dealing with any joint issues — knees, hips, or feet — or do you run neutral without much overpronation?", sources: [
          { title: "When to Replace Running Shoes", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/how-to-know-when-to-replace-running-shoes" },
          { title: "What is a Gait Analysis?", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/what-is-a-gait-analysis" }
        ]},
        { text: "That's exactly what I need. A good marathon trainer needs to hold up through high mileage and keep your legs feeling good on the long runs. To dial in the right match: what shoe size do you wear, and are you shopping for men's or women's?", sources: [
          { title: "How to Choose Running Shoes", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/how-to-choose-running-shoes" }
        ]}
      ],
      "How can I prioritize injury prevention while training for running?": [
        { text: "Injury prevention is the smartest thing you can invest in — most running injuries are preventable. The three biggest causes: building mileage too fast, the wrong shoe for your gait, and skipping strength work. Hip and glute strength matter more than most runners realize — weak hips lead to knee and IT band problems. Are you dealing with a specific issue right now like knee pain, shin splints, or plantar fasciitis, or are you being proactive before something comes up?", sources: [
          { title: "Guide to Proper Running Form", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/guide-to-proper-running-form" },
          { title: "Five Pre-Run Stretches", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/five-pre-run-stretches" }
        ]},
        { text: "Good context. The most important gait factor for injury prevention is whether you overpronate — if your foot rolls inward on landing, a stability shoe can significantly reduce stress on your knees and ankles. Do you know if you overpronate, or have you had a gait analysis done? And roughly how many days a week are you running?", sources: [
          { title: "What is a Gait Analysis?", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/what-is-a-gait-analysis" },
          { title: "Benefits of Cushioned Running Shoes", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/the-benefits-of-cushioned-running-shoes" }
        ]},
        { text: "That's exactly what I needed to hear. Matching you to the right stability or cushioning level can make a real difference long-term. One quick question: what shoe size do you wear, and are you shopping for men's or women's?", sources: [
          { title: "How to Choose Running Shoes", url: "https://www.dickssportinggoods.com/protips/sports-and-activities/running/how-to-choose-running-shoes" }
        ]}
      ]
    },
    followups: {
      "I'm brand new to running. How do I get started?": ["How do I improve my running form?", "What's a good beginner 5K training plan?", "How often should I run as a beginner?"],
      "I'm training for my first marathon.": ["How should I fuel during long runs?", "How do I build my weekly mileage safely?", "What should I wear for marathon training?"],

    ${hasLinks ? `<div class="sources-panel" hidden>${sources.map(s => `<a href="${s.url}" target="_blank" rel="noopener">${s.title}</a>`).join('')}</div>` : ''}
    <div class="feedback-btns">
      <button class="feedback-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M7 22V11M2 13v7a1 1 0 001 1h14.29a1 1 0 00.995-.9l.71-7a1 1 0 00-.995-1.1H14V5a3 3 0 00-3-3 1 1 0 00-1 1v.5L7.5 9H3a1 1 0 00-1 1v1a1 1 0 001 1H7" stroke="#131313" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="feedback-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M17 2v11M22 11V4a1 1 0 00-1-1H6.71a1 1 0 00-.995.9l-.71 7a1 1 0 00.995 1.1H10v5a3 3 0 003 3 1 1 0 001-1v-.5l2.5-5.5H21a1 1 0 001-1v-1a1 1 0 00-1-1H17" stroke="#131313" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>`;
  const btn = row.querySelector('.sources-btn');
  if (hasLinks) {
    btn.addEventListener('click', () => {
      const panel = row.querySelector('.sources-panel');
      panel.hidden = !panel.hidden;
    });
  }
  messagesEl.appendChild(row);
  scrollToBottom();
}

function addBubble(text, role, sources) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (role === 'assistant') {
    const avatar = document.createElement('div');
    avatar.className = 'dicks-avatar';
    avatar.textContent = "DICK'S";
    row.appendChild(avatar);
  }
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  if (role === 'assistant') showFeedback(sources);
  scrollToBottom();
  return bubble;
}

function showLoading() {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.id = 'loading-row';
  const avatar = document.createElement('div');
  avatar.className = 'dicks-avatar';
  avatar.textContent = "DICK'S";
  row.appendChild(avatar);
  const dots = document.createElement('div');
  dots.className = 'loading-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(dots);
  messagesEl.appendChild(row);
  scrollToBottom();
}

function hideLoading() {
  const el = document.getElementById('loading-row');
  if (el) el.remove();
}

function showFollowUps(pathKey) {
  const suggestions = FOLLOWUP_SUGGESTIONS[pathKey] || [
    "What's the best way to track my running progress?",
    "How do I choose between road and trail shoes?",
    "What should I look for when buying running shoes?"
  ];
  const section = document.createElement('div');
  section.className = 'followups-section';
  const label = document.createElement('div');
  label.className = 'followups-label';
  label.textContent = 'Get more Pro Tips';
  section.appendChild(label);
  const pillsContainer = document.createElement('div');
  pillsContainer.className = 'followup-pills';
  suggestions.forEach(q => {
    const pill = document.createElement('button');
    pill.className = 'followup-pill';
    pill.innerHTML = `${ARROW_SVG}<span>${q}</span>`;
    pill.addEventListener('click', () => {
      if (!waiting) {
        section.remove();
        addBubble(q, 'user');
        chatHistory.push({ role: 'user', content: q });
        getResponse();
      }
    });
    pillsContainer.appendChild(pill);
  });
  section.appendChild(pillsContainer);
  messagesEl.appendChild(section);
  scrollToBottom();
}

function showShoeCard(shoe) {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  const avatar = document.createElement('div');
  avatar.className = 'dicks-avatar';
  avatar.textContent = "DICK'S";
  row.appendChild(avatar);
  const card = document.createElement('div');
  card.className = 'shoe-rec-card';
  const cardBtnHtml = (email && sendRec)
    ? `<button class="shoe-rec-link"><span>Send it to Me</span></button>`
    : `<a class="shoe-rec-link" href="${shoe.link}" target="_blank">Shop at DICK'S →</a>`;
  card.innerHTML = `
    <img src="${shoe.img}" alt="${shoe.name}" loading="lazy">
    <div class="shoe-rec-card-body">
      <div class="shoe-rec-name">${shoe.name}</div>
      <div class="shoe-rec-price">${shoe.price} · ${shoe.cushion} cushion · ${shoe.drop} drop</div>
      ${cardBtnHtml}
    </div>
  `;
  if (email && sendRec) {
    const btn = card.querySelector('.shoe-rec-link');
    btn.onclick = () => sendEmail(shoe, btn, row);
  }
  row.appendChild(card);
  messagesEl.appendChild(row);

  recommendedShoe = shoe;
  scrollToBottom();
}

async function sendEmail(shoe, btn, row) {
  btn.disabled = true;
  const span = btn.querySelector('span');
  if (span) span.textContent = 'Sending…';
  try {
    const userH = chatHistory.filter(m => m.role === 'user').map(m => m.content.toLowerCase()).join(' ');
    const allH = chatHistory.map(m => m.content.toLowerCase()).join(' ');
    const isW = userH.includes('women') || userH.includes('female');
    let level = 'beginner';
    if (allH.includes('marathon') || allH.includes('miles per week') || allH.includes('training plan') || allH.includes('experienced')) level = 'intermediate';
    if (allH.includes('pr ') || allH.includes('competitive') || allH.includes('race') || allH.includes('vaporfly')) level = 'advanced';

    const aiSummary = chatHistory.map(m =>
      `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`
    ).join('\n\n');

    const payload = {
      email,
      firstName,
      lastName,
      sport: SPORT.name,
      level,
      sendRecommendation: sendRec,
      filters: [{ name: 'gender', value: isW ? "Women's" : "Men's" }],
      imageUrl: shoe.img.replace('wid=600&hei=600', 'wid=1100&hei=1100'),
      productName: shoe.name.toLowerCase(),
      productUrl: shoe.link,
      aiSummary
    };

    const res = await fetch('https://psv1q7yhxd.execute-api.us-west-2.amazonaws.com/prod/summitpay', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.accepted) {
      window.location.href = 'https://di1ae3iseog1g.cloudfront.net/dsg/completion.html';
    } else {
      throw new Error('not accepted');
    }
  } catch (e) {
    btn.disabled = false;
    if (span) span.textContent = 'Retry sending';
  }
}

// ─── Chat ─────────────────────────────────────────────────────────────────
function startChat(question) {
  welcomeEl.style.display = 'none';
  inChat = true;
  addBubble(question, 'user');
  chatHistory.push({ role: 'user', content: question });
  scriptedPath = question;
  scriptedStep = 0;
  getResponse();
}

async function getResponse() {
  waiting = true;
  inputEl.disabled = true;
  showLoading();
  if (CLAUDE_API_KEY) {
    await getClaudeResponse();
  } else {
    await getScriptedResponse();
  }
  waiting = false;
  inputEl.disabled = false;
  inputEl.focus();
}

async function getClaudeResponse() {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': CLAUDE_API_KEY,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-allow-browser': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 512,
        system: SYSTEM_PROMPT,
        messages: chatHistory
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    hideLoading();
    const recMatch = text.match(/RECOMMEND:([a-z0-9-]+)/);
    const displayText = text.replace(/\nRECOMMEND:[a-z0-9-]+/, '').trim();
    chatHistory.push({ role: 'assistant', content: text });
    addBubble(displayText, 'assistant');
    if (recMatch) {
      const shoe = SHOES.find(s => s.id === recMatch[1]);
      if (shoe) setTimeout(() => showShoeCard(shoe), 400);
    } else {
      setTimeout(() => showFollowUps(scriptedPath), 300);
    }
  } catch (e) {
    hideLoading();
    await getScriptedResponse(true);
  }
}

async function getScriptedResponse(fallback = false) {
  await new Promise(r => setTimeout(r, 900 + Math.random() * 600));
  hideLoading();
  const path = SCRIPTS[scriptedPath];
  if (path && scriptedStep < path.length) {
    const entry = path[scriptedStep++];
    if (entry === null) {
      const shoe = SHOES.find(s => s.id === pickScriptedRec()) || SHOES[0];
      const recText = `Based on everything you've shared, ${firstName ? firstName + ', ' : ''}here is my top pick for you:`;
      chatHistory.push({ role: 'assistant', content: recText });
      addBubble(recText, 'assistant', []);
      setTimeout(() => showShoeCard(shoe), 400);
    } else {
      const text = typeof entry === 'string' ? entry : entry.text;
      const sources = typeof entry === 'object' && entry.sources ? entry.sources : [];
      chatHistory.push({ role: 'assistant', content: text });
      addBubble(text, 'assistant', sources);
      setTimeout(() => showFollowUps(scriptedPath), 300);
    }
  } else {
    const shoe = SHOES.find(s => s.id === pickScriptedRec()) || SHOES[0];
    const recText = `${firstName ? 'Great, ' + firstName + '! ' : 'Great! '}Based on what you've told me, here is my top pick:`;
    chatHistory.push({ role: 'assistant', content: recText });
    addBubble(recText, 'assistant', []);
    setTimeout(() => showShoeCard(shoe), 400);
  }
}

function pickScriptedRec() {
  const h = chatHistory.map(m => m.content.toLowerCase()).join(' ');
  const userH = chatHistory.filter(m => m.role === 'user').map(m => m.content.toLowerCase()).join(' ');
  return SPORT.pickRec(h, scriptedPath, userH) || SHOES[0].id;
}

function handleSend() {
  const text = inputEl.value.trim();
  if (!text || waiting) return;
  inputEl.value = '';
  if (!inChat) { startChat(text); return; }
  addBubble(text, 'user');
  chatHistory.push({ role: 'user', content: text });
  getResponse();
}

sendBtnEl.addEventListener('click', handleSend);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
starterCardsEl.addEventListener('click', e => {
  const card = e.target.closest('.starter-card');
  if (card && !waiting) { const q = card.getAttribute('data-q'); if (q) startChat(q); }
});
</script>
