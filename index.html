<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DICK'S">
<meta http-equiv="Cache-control" content="no-store">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<title>Adobe x DICK'S</title>
<style>
@font-face {
  font-family: 'DSGSans';
  src: url('fonts/DSGSans-Black.otf') format('opentype');
  font-weight: 900;
  font-style: normal;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Archivo', sans-serif;
  background-color: #f7f8fa;
  font-size: 16px;
  overflow: hidden;
}

body, html { height: 100dvh; }

#hero {
  width: 100%;
  position: fixed;
  top: 0;
  left: 0;
  height: 100%;
  z-index: 0;
}

#hero video {
  width: 100%;
  height: auto;
  display: block;
}

.container {
  width: calc(100% - 40px);
  left: 20px;
  bottom: 16px;
  background-color: #fff;
  border-radius: 28px;
  padding: 18px 20px 20px;
  box-sizing: border-box;
  position: fixed;
  z-index: 1;
}

.header {
  font-family: 'DSGSans', sans-serif;
  font-weight: 900;
  font-size: 44px;
  line-height: 42px;
  margin: 14px 0 12px;
}

.description {
  line-height: 21px;
  margin-bottom: 18px;
  font-size: 15px;
  color: #333;
}

.row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.styled-input {
  outline: none;
  border: 1px solid #dadada;
  border-radius: 10px;
  padding: 11px 10px;
  color: #000;
  background: #fff;
  box-sizing: border-box;
  font-size: 16px;
  font-family: 'Archivo', sans-serif;
}

.styled-input::placeholder { color: #8e8e93; opacity: 1; }

.checkbox-row {
  display: flex;
  align-items: center;
  margin-top: 16px;
  user-select: none;
}

.styled-checkbox {
  margin-right: 10px;
  width: 18px;
  height: 18px;
  accent-color: #dadada;
  flex-shrink: 0;
}

.checkbox-label { font-size: 15px; cursor: pointer; }

#firstName, #lastName { width: 50%; }
#email { width: 100%; }

.submit-button-container { text-align: center; }

#submit-button {
  display: inline-block;
  font-family: 'Archivo', sans-serif;
  font-weight: 600;
  font-size: 16px;
  border: none;
  padding: 14px 40px;
  border-radius: 25px;
  cursor: pointer;
  color: #fff;
  background-color: #3b63fb;
  margin-top: 20px;
}

a { -webkit-tap-highlight-color: transparent; text-decoration: none; }
a:active #submit-button { opacity: 0.8; }
</style>
</head>
<body>

<div id="hero">
  <video src="video.mp4" autoplay loop muted playsinline></video>
</div>

<div class="container">
  <img src="axd.png" alt="Adobe x DICK'S" width="164">
  <div class="header">Equipping every athlete.</div>
  <div class="description">Experience how DICK'S Sporting Goods is using AI to personally equip every athlete. Have a real conversation with DICK'S Brand Concierge and get a shoe recommendation tailored to you.</div>
  <div class="row">
    <input class="styled-input" type="text" id="firstName" placeholder="First Name">
    <input class="styled-input" type="text" id="lastName" placeholder="Last Name">
  </div>
  <div class="row">
    <input class="styled-input" type="email" id="email" placeholder="Email">
  </div>
  <div class="checkbox-row">
    <input class="styled-checkbox" type="checkbox" checked id="send-recommendation">
    <label for="send-recommendation" class="checkbox-label">Yes! Send the recommended shoe to the email provided.</label>
  </div>
  <div class="submit-button-container">
    <a href="selector.html" id="submit-link"><div id="submit-button">Next</div></a>
  </div>
</div>

<script>
document.getElementById('submit-link').addEventListener('click', function(e) {
  e.preventDefault();
  const p = new URLSearchParams();
  const fn = document.getElementById('firstName').value.trim();
  const ln = document.getElementById('lastName').value.trim();
  const em = document.getElementById('email').value.trim();
  const sr = document.getElementById('send-recommendation').checked;
  if (fn) p.set('firstName', fn);
  if (ln) p.set('lastName', ln);
  if (em) p.set('email', em);
  p.set('sendRecommendation', sr);
  window.location.href = 'selector.html?' + p.toString();
});
</script>

</body>
</html>
